<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Task Manager - Task 7 Cohort 3.0</title>
    <link rel="stylesheet" href="style.css" />
    <link
      href="https://cdn.jsdelivr.net/npm/remixicon@4.9.0/fonts/remixicon.css"
      rel="stylesheet"
    />
  </head>
  <body>
    <header>
      <div class="left">
        <h1>TASKIFY</h1>
        <p>Manage your tasks easily</p>
      </div>

      <div class="right">
        <button class="open-form">Create Task</button>
      </div>
    </header>

    <div class="empty-state-ui">
      <h2>No Tasks!</h2>
      <p>Create your first task now</p>
      <button class="open-form">Create Task</button>
      <img src="notaskimage.png" alt="Empty State Image">
    </div>

    <main>
      <div class="hero"></div>
    </main>
    <section class="overlay">
      <form>
        <div class="title">
          <h2>New Task</h2>
        </div>
        <div class="category">
          <p><i class="ri-suitcase-fill"></i>Work</p>
          <p><i class="ri-user-fill"></i>Personal</p>
          <p><i class="ri-shopping-cart-2-fill"></i>Shopping</p>
          <p><i class="ri-book-read-fill"></i>Study</p>
          <p><i class="ri-heart-fill"></i>Health</p>
        </div>
        <div class="inputs">
          <div class="input1">
            <label for="task-title">Task Title</label>
            <input
              id="task-title"
              type="text"
              placeholder="Enter task title..."
              required
            />
          </div>
          <div class="input2">
            <label for="task-description">Description</label>
            <input
              id="task-description"
              type="text"
              placeholder="Enter description..."
              required
            />
          </div>

          <div class="form-buttons">
            <button type="button" class="create-btn">Create Task</button>
            <button type="button" class="cancel-btn">Cancel</button>
          </div>
        </div>
      </form>
    </section>
    <div class="delete-modal">
      <div class="delete-box">
        <h2>Delete Task?</h2>
        <p>This action cannot be undone.</p>

        <div class="delete-actions">
          <button class="cancel-delete">Cancel</button>
          <button class="confirm-delete">Delete</button>
        </div>
      </div>
    </div>

    <script src="script.js"></script>
  </body>
</html>
